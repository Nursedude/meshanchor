# MeshForge Example: USB LoRa Device Configuration
#
# For USB-connected Meshtastic devices (Heltec V3, T-Beam, RAK4631, etc.)
# Copy to: /etc/meshtasticd/config.d/usb-device.yaml
#
# The USB device handles its own LoRa configuration, so this is minimal.
# Radio settings are configured via Meshtastic app/CLI, not this file.

# === Serial Connection ===
# Meshtasticd auto-detects USB devices, but you can specify:
# Serial:
#   Device: /dev/ttyUSB0    # Usually auto-detected
#   Baud: 115200            # Default baud rate

# === TCP Interface ===
# This is what MeshForge connects to
TCP:
  Port: 4403                # Default port (don't change unless needed)
  # BindAddress: 127.0.0.1  # Uncomment to restrict to localhost only

# === Web Interface (Optional) ===
Webserver:
  Port: 443                 # HTTPS port for meshtasticd web UI
  # Port: 80                # Use 80 for HTTP

# === Logging ===
Logging:
  LogLevel: info            # debug, info, warn, error

# === Notes ===
#
# 1. USB devices are plug-and-play. Meshtasticd auto-detects them.
#
# 2. To change radio settings (region, preset, channels), use:
#    meshtastic --host localhost --set lora.region US
#    meshtastic --host localhost --set lora.modem_preset LONG_FAST
#
# 3. For multiple USB devices, specify different ports:
#    Device 1: TCP.Port: 4403
#    Device 2: TCP.Port: 4404
#
# 4. Check device connection:
#    meshtastic --host localhost --info
