# Regional RNS Client Configuration
# ===================================
# For: RPi-B (wh6gxzpi3) - Client connecting to Regional
#
# This configuration sets up:
# 1. TCP Client connecting to Regional server
# 2. Local RNode interface for LoRa mesh
#
# Copy to: ~/.reticulum/config
# Then run: rnsd (or use with nomadnet, sideband, etc.)
#
# IMPORTANT: Change target_host to your server's IP address!
#
# Generated by MeshForge - https://github.com/Nursedude/meshforge

[reticulum]
  enable_transport = False
  share_instance = True
  shared_instance_port = 37428
  instance_control_port = 37429
  panic_on_interface_errors = False

[logging]
  loglevel = 4

[interfaces]

# TCP Client - connects to Regional server
# CHANGE target_host to your server's IP address
[[Regional RNS]]
    type = TCPClientInterface
    enabled = yes
    target_host = 192.168.86.38
    target_port = 4242
    name = Regional RNS

# Local RNode LoRa Interface
# Must match server's frequency settings!
[[wh6gxzpi3 rnode]]
    type = RNodeInterface
    interface_enabled = True
    port = /dev/ttyACM0
    frequency = 903625000
    txpower = 22
    bandwidth = 250000
    spreadingfactor = 7
    codingrate = 5
    name = wh6gxzpi3 rnode
    selected_interface_mode = 1
    configured_bitrate = None

# Optional: Multiple server connections for redundancy
# [[Backup Server]]
#     type = TCPClientInterface
#     enabled = yes
#     target_host = 192.168.86.100
#     target_port = 4242
