# Basic RNode Configuration
# =========================
# Minimal setup for a single RNode device
#
# Copy to: ~/.reticulum/config
#
# Generated by MeshForge

[reticulum]
  enable_transport = False
  share_instance = True
  shared_instance_port = 37428
  instance_control_port = 37429
  panic_on_interface_errors = False

[logging]
  loglevel = 4

[interfaces]

# RNode LoRa Interface
# Adjust port, frequency, and power for your setup
[[RNode]]
    type = RNodeInterface
    interface_enabled = True

    # USB port - check with: ls /dev/ttyACM* /dev/ttyUSB*
    port = /dev/ttyACM0

    # Frequency in Hz - must match other nodes!
    # US: 902-928 MHz, EU: 863-870 MHz
    frequency = 903625000

    # TX Power in dBm (typically 2-22)
    txpower = 17

    # Modulation settings - must match other nodes!
    bandwidth = 250000      # 125000, 250000, or 500000
    spreadingfactor = 7     # 6-12 (higher = more range, slower)
    codingrate = 5          # 5-8 (higher = more error correction)

    name = RNode
