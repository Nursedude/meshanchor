# Meshtastic Bridge Configuration
# ================================
# For bridging between RNS and Meshtastic networks
#
# This setup requires:
# 1. meshtasticd running on localhost:4403
# 2. MeshForge gateway bridge service
#
# RNS handles the Reticulum side (LXMF, NomadNet, Sideband)
# Meshtasticd handles the Meshtastic side
# MeshForge bridges messages between them
#
# Copy to: ~/.reticulum/config
#
# Generated by MeshForge

[reticulum]
  enable_transport = True
  share_instance = True
  shared_instance_port = 37428
  instance_control_port = 37429
  panic_on_interface_errors = False

[logging]
  loglevel = 4

[interfaces]

# TCP Server for local RNS applications
# NomadNet, Sideband, MeshChat connect here
[[Local RNS]]
    type = TCPServerInterface
    enabled = yes
    listen_ip = 127.0.0.1
    listen_port = 4242
    name = Local RNS

# Optional: RNode for direct RNS mesh
# Uncomment if you have an RNode in addition to Meshtastic
# [[RNode Mesh]]
#     type = RNodeInterface
#     interface_enabled = True
#     port = /dev/ttyACM1
#     frequency = 903625000
#     txpower = 22
#     bandwidth = 250000
#     spreadingfactor = 7
#     codingrate = 5

# Note: Meshtastic is NOT configured here!
# Meshtastic runs via meshtasticd on port 4403
# MeshForge connects to both RNS and meshtasticd
#
# Start order:
# 1. meshtasticd --host 127.0.0.1 --port 4403
# 2. rnsd
# 3. python3 meshforge/src/gateway/rns_bridge.py
#
# Or use MeshForge GTK to start everything
