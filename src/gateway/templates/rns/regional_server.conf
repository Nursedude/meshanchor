# Regional RNS Server Configuration
# ===================================
# For: RPi-A (RNSmeshgate) - Primary gateway server
#
# This configuration sets up:
# 1. TCP Server on port 4242 for client connections
# 2. RNode interface at 903.625 MHz for LoRa mesh
#
# Copy to: ~/.reticulum/config
# Then run: rnsd
#
# Generated by MeshForge - https://github.com/Nursedude/meshforge

[reticulum]
  enable_transport = True
  share_instance = True
  shared_instance_port = 37428
  instance_control_port = 37429
  panic_on_interface_errors = False

[logging]
  loglevel = 4

[interfaces]

# TCP Server - allows remote clients to connect
# Clients use TCPClientInterface pointing to this server's IP
[[Regional RNS]]
    type = TCPServerInterface
    enabled = yes
    listen_ip = 0.0.0.0
    listen_port = 4242
    name = Regional RNS
    selected_interface_mode = 1
    configured_bitrate = None

# RNode LoRa Interface - connects to mesh network
# Adjust port if your RNode is on different USB port
[[nurse dude rnode gateway]]
    type = RNodeInterface
    interface_enabled = True
    port = /dev/ttyACM0
    frequency = 903625000
    txpower = 22
    bandwidth = 250000
    spreadingfactor = 7
    codingrate = 5
    name = nurse dude rnode gateway
    selected_interface_mode = 1
    configured_bitrate = None

# Optional: Add more interfaces here
# Example - second RNode on different frequency:
