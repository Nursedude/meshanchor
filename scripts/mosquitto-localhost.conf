# /etc/mosquitto/conf.d/01-meshanchor.conf
#
# Installed by scripts/deploy_noc.sh as the default safe profile for
# MeshAnchor's local mosquitto broker:
#   - listener bound to 127.0.0.1 only (unreachable from the network)
#   - anonymous access allowed (safe because the bind is the security boundary)
#
# Why this shape:
# - Localhost-bind IS the security boundary. With nothing remote able
#   to reach :1883, anonymous access poses no exposure.
# - mosquitto 2.0+ disallows anonymous connections on non-loopback
#   listeners by default. Being explicit here means we don't rely on
#   distro-default behavior — which has shifted between mosquitto
#   versions and packagers, and was a recurring stumbling block in dev.
# - Persistence + logging are inherited from /etc/mosquitto/mosquitto.conf
#   (the Debian default ships with persistence enabled and logs to
#   /var/log/mosquitto/mosquitto.log). We do NOT override those here.
#
# Want to expose the broker to the network? Don't edit this file —
# add /etc/mosquitto/conf.d/99-public.conf with auth + TLS configured
# in the SAME change. Security and functionality must shift together;
# never just widen the bind without setting up authentication.

listener 1883 127.0.0.1
allow_anonymous true
