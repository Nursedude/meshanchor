# MeshForge Type Checking Configuration
# =====================================
# Static type checking for reliability-critical mesh networking software.
#
# Usage:
#   pip install mypy types-requests
#   mypy src/
#
# Or check specific files:
#   mypy src/utils/analytics.py src/utils/service_check.py

[mypy]
# Python version
python_version = 3.9

# Path configuration - run from repo root
mypy_path = src
files = src/
explicit_package_bases = True
exclude = (?x)(
    ^src/plugins/  # Plugin paths cause module conflicts
    | __pycache__
    | \.git
  )

# ============================================================================
# STRICT SETTINGS (Enabled gradually for reliability)
# ============================================================================

# Warn about unused ignores
warn_unused_ignores = True

# Warn about returning Any from typed functions
warn_return_any = True

# Warn about unreachable code
warn_unreachable = True

# Show error codes for easier suppression
show_error_codes = True

# ============================================================================
# LENIENT SETTINGS (For gradual adoption)
# ============================================================================

# Don't require type annotations everywhere (yet)
disallow_untyped_defs = False

# Allow implicit Optional
no_implicit_optional = False

# Don't fail on missing imports (many mesh networking libs untyped)
ignore_missing_imports = True

# Allow Any as return type (common in dynamic code)
allow_untyped_globals = True

# ============================================================================
# PER-MODULE OVERRIDES
# ============================================================================

# Core utilities - stricter checking
[mypy-utils.analytics]
disallow_untyped_defs = True
warn_return_any = True

[mypy-utils.service_check]
disallow_untyped_defs = True

[mypy-utils.knowledge_base]
disallow_untyped_defs = True

[mypy-utils.diagnostic_engine]
disallow_untyped_defs = True

[mypy-utils.rf]
disallow_untyped_defs = True

[mypy-utils.paths]
disallow_untyped_defs = True

# Gateway - reliability critical
[mypy-gateway.message_queue]
disallow_untyped_defs = True

[mypy-gateway.rns_bridge]
warn_return_any = True

# Tests - relaxed
[mypy-tests.*]
disallow_untyped_defs = False
ignore_errors = True

# ============================================================================
# IGNORE PATTERNS (External/Generated)
# ============================================================================

# GTK bindings are dynamically typed
[mypy-gi.*]
ignore_missing_imports = True
ignore_errors = True

# Meshtastic library
[mypy-meshtastic.*]
ignore_missing_imports = True

# RNS library
[mypy-RNS.*]
ignore_missing_imports = True

# Folium (map generation)
[mypy-folium.*]
ignore_missing_imports = True

# ============================================================================
# NOTES FOR CONTRIBUTORS
# ============================================================================
#
# Adding type hints:
#   1. Start with function signatures (args and return types)
#   2. Add variable annotations where types aren't obvious
#   3. Use Optional[T] for nullable values
#   4. Use TypedDict for structured dicts
#
# Suppressing errors:
#   # type: ignore[error-code]  - Inline suppression with reason
#
# Example typed function:
#   def calculate_link_budget(
#       tx_power_dbm: float,
#       rx_sensitivity_dbm: float,
#       distance_km: float
#   ) -> float:
#       """Calculate link budget in dB."""
#       ...
#
# Running mypy in CI:
#   mypy src/ --strict --ignore-missing-imports
