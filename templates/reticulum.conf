# MeshForge - Reticulum Configuration Example
# Install location: ~/.reticulum/config
#
# This is a working config for RNS bridged to Meshtastic via MeshForge.
# After installing rnsd (pip3 install rns), copy this to ~/.reticulum/config
# and restart: sudo systemctl restart rnsd
#
# Optional RNS apps:
#   pip3 install nomadnet    # Terminal-based mesh messenger
#   pip3 install meshchat    # Mesh chat application
#
# For full config reference: rnsd --exampleconfig

[reticulum]

  # If you enable Transport, your system will route traffic
  # for other peers, pass announces and serve path requests.
  # This should only be done for systems that are suited to
  # act as transport nodes, ie. if they are stationary and
  # always-on.

  enable_transport = False


  # The shared instance allows multiple RNS programs to
  # share a single set of interfaces. Generally should
  # be enabled on any system running rnsd.

  share_instance = Yes


  # If running multiple shared instances on the same system,
  # specify different instance names for each.

  instance_name = default


[logging]
  # Valid log levels are 0 through 7:
  #   0: Log only critical information
  #   1: Log errors and lower log levels
  #   2: Log warnings and lower log levels
  #   3: Log notices and lower log levels
  #   4: Log info and lower (default)
  #   5: Verbose logging
  #   6: Debug logging
  #   7: Extreme logging

  loglevel = 4


[interfaces]

  # ===== LOCAL DISCOVERY =====
  # AutoInterface enables link-local discovery of other
  # Reticulum nodes over UDP multicast. Requires link-local
  # IPv6 (enabled by default on most systems).

  [[Default Interface]]
    type = AutoInterface
    enabled = Yes

  # ===== MESHTASTIC INTERFACE =====
  # RNS over Meshtastic - bridges RNS to the Meshtastic mesh
  # Connects to meshtasticd TCP API on port 4403
  # Source: https://github.com/Nursedude/RNS_Over_Meshtastic_Gateway

  [[Meshtastic Interface]]
    type = Meshtastic_Interface
    enabled = true
    mode = gateway
    tcp_port = 127.0.0.1:4403
    data_speed = 0
    hop_limit = 3
    bitrate = 500

  # ===== RNODE LORA INTERFACE (OPTIONAL) =====
  # Direct LoRa via RNode hardware (T-Beam, Heltec, etc.)
  # Uncomment and adjust for your hardware/region.
  # This provides a dedicated RNS LoRa link separate from Meshtastic.

  # [[RNode LoRa Interface]]
  #   type = RNodeInterface
  #   interface_enabled = True
  #   port = /dev/ttyACM0
  #   frequency = 903625000
  #   bandwidth = 250000
  #   txpower = 22
  #   spreadingfactor = 7
  #   codingrate = 5
