# MeshForge - Reticulum Network Stack Configuration
# =================================================
#
# Install location: /etc/reticulum/config (system-wide, preferred)
#   Alternative: ~/.reticulum/config (user-only)
#
# After editing, restart rnsd: sudo systemctl restart rnsd
#
# This template includes ALL supported RNS interface types.
# Uncomment and configure the interfaces you need.
#
# RNS ecosystem:
#   pip3 install rns         # Core + rnsd daemon
#   pip3 install nomadnet    # Terminal mesh messenger (https://github.com/markqvist/nomadnet)
#   pip3 install meshchat    # Mesh chat application
#   pip3 install sbapp       # Sideband - mobile/desktop LXMF client
#
# Full config reference: rnsd --exampleconfig
# Interface docs: https://reticulum.network/manual/interfaces.html


[reticulum]

  # If you enable Transport, your system will route traffic
  # for other peers, pass announces and serve path requests.
  # Only for stationary, always-on systems (gateways, servers).

  enable_transport = False


  # The shared instance allows multiple RNS programs (rnsd,
  # nomadnet, sideband, etc.) to share interfaces. Must be
  # enabled when running rnsd as a daemon.

  share_instance = Yes


  # Shared instance ports. Defaults work for most setups.
  # Only change if running multiple instances on one machine.

  shared_instance_port = 37428
  instance_control_port = 37429


[logging]
  # 0=Critical  1=Error  2=Warning  3=Notice
  # 4=Info (default)  5=Verbose  6=Debug  7=Extreme

  loglevel = 4


[interfaces]

  # ===========================================================================
  # AUTO INTERFACE - Local Network Discovery (zero-config)
  # ===========================================================================
  # Discovers other RNS nodes on the same LAN via UDP multicast.
  # Requires link-local IPv6 (enabled by default on most systems).
  # Firewall: allow UDP ports 29716 and 42671.

  [[Default Interface]]
    type = AutoInterface
    enabled = Yes

    # Optional: restrict to specific network devices
    # devices = wlan0,eth0
    # ignored_devices = tun0,docker0

    # Optional: isolate networks with different group IDs
    # group_id = meshforge_net

    # Optional: discovery scope (link, admin, site, organisation, global)
    # discovery_scope = link


  # ===========================================================================
  # MESHTASTIC INTERFACE - RNS over Meshtastic LoRa
  # ===========================================================================
  # Bridges RNS traffic over Meshtastic LoRa mesh networks.
  # Requires: Meshtastic_Interface.py plugin in interfaces/ folder
  #   Source: https://github.com/landandair/RNS_Over_Meshtastic
  #   Install: Copy Interface/Meshtastic_Interface.py to interfaces/
  #
  # Connection options (choose ONE):
  #   port     = /dev/ttyUSB0          # USB serial (Linux)
  #   port     = /dev/ttyACM0          # USB ACM device
  #   port     = COM3                  # USB serial (Windows)
  #   ble_port = short_1234            # Bluetooth LE
  #   tcp_port = 127.0.0.1:4403        # TCP to meshtasticd daemon
  #
  # data_speed presets (do not use long-fast):
  #   8 = SHORT_TURBO  (0.4s delay, recommended for RNS)
  #   6 = SHORT_FAST   (1.0s delay)
  #   5 = SHORT_SLOW   (3.0s delay)
  #   4 = MEDIUM_FAST  (4.0s delay, slowest recommended)
  #   3 = MEDIUM_SLOW  (6.0s delay)
  #   7 = LONG_MOD     (12.0s delay)
  #   0 = LONG_FAST    (8.0s delay)
  #   1 = LONG_SLOW    (15.0s delay)

  # --- Short Turbo config (recommended) ---
  # [[Meshtastic Interface]]
  #   type = Meshtastic_Interface
  #   enabled = true
  #   mode = gateway
  #   port = /dev/ttyUSB0
  #   # ble_port = short_1234
  #   # tcp_port = 127.0.0.1:4403
  #   data_speed = 8

  # --- Long Fast config ---
  # [[Meshtastic Interface]]
  #   type = Meshtastic_Interface
  #   enabled = true
  #   mode = gateway
  #   port = /dev/ttyUSB0
  #   # ble_port = short_1234
  #   # tcp_port = 127.0.0.1:4403
  #   data_speed = 0


  # ===========================================================================
  # TCP SERVER INTERFACE - Host an RNS entry point
  # ===========================================================================
  # Allows remote peers to connect to this node over TCP/IP.
  # Other nodes use TCPClientInterface to reach this server.
  # Never use kiss_framing with TCP server/client pairs.
  #
  # Example: Host a public or LAN-accessible RNS gateway.

  # [[TCP Server]]
  #   type = TCPServerInterface
  #   enabled = yes
  #   listen_ip = 0.0.0.0
  #   listen_port = 4242
  #   # i2p_tunneled = no


  # ===========================================================================
  # TCP CLIENT INTERFACE - Connect to a remote RNS node
  # ===========================================================================
  # Connects to a TCPServerInterface on another machine.
  # Handles intermittent connections gracefully (auto-reconnect).
  # Never use kiss_framing with TCP server/client pairs.

  # [[TCP Client]]
  #   type = TCPClientInterface
  #   enabled = yes
  #   target_host = 192.168.1.100
  #   target_port = 4242
  #   # i2p_tunneled = no

  # --- Public RNS Community Nodes ---
  # Uncomment to connect to the global RNS testnet or community nodes:

  # [[RNS Dublin Testnet]]
  #   type = TCPClientInterface
  #   enabled = yes
  #   target_host = dublin.connect.reticulum.network
  #   target_port = 4965

  # [[RNS BetweenTheBorders]]
  #   type = TCPClientInterface
  #   enabled = yes
  #   target_host = reticulum.betweentheborders.com
  #   target_port = 4242

  # [[RNS Acehoss]]
  #   type = TCPClientInterface
  #   enabled = yes
  #   target_host = rns.acehoss.net
  #   target_port = 4242


  # ===========================================================================
  # BACKBONE INTERFACE - High-performance server (Linux/Android only)
  # ===========================================================================
  # Kernel-event I/O backend, handles thousands of clients efficiently.
  # Fully compatible with TCP Server/Client interfaces (cross-connectable).
  # Recommended for high-traffic gateways on Linux.

  # [[Backbone Server]]
  #   type = BackboneInterface
  #   enabled = yes
  #   listen_ip = 0.0.0.0
  #   listen_port = 4242


  # ===========================================================================
  # RNODE INTERFACE - Direct LoRa via RNode hardware
  # ===========================================================================
  # Uses RNode-compatible LoRa hardware (T-Beam, Heltec, LilyGO, etc.)
  # for dedicated RNS LoRa links. Separate from Meshtastic.
  #
  # Connection: USB serial, WiFi TCP, or Bluetooth LE
  #   port = /dev/ttyACM0              # USB serial
  #   port = tcp://10.0.0.1            # WiFi TCP
  #   port = ble://RNode 3B87          # Bluetooth LE by name
  #   port = ble://F4:12:73:29:4E:89   # Bluetooth LE by MAC
  #
  # US 900 MHz band (902-928 MHz) frequency slots:
  #   903875000 (slot 0, default)  |  903625000 (slot 12, HawaiiNet)
  #   906125000 (slot 2)           |  915125000 (slot 6)
  #
  # Modulation must match all nodes on the same link:
  #   LONG_FAST:    SF7,  BW250k, CR5 (best range/speed balance)
  #   LONG_SLOW:    SF11, BW125k, CR8 (maximum range)
  #   SHORT_TURBO:  SF6,  BW500k, CR5 (maximum speed)

  # [[RNode LoRa Interface]]
  #   type = RNodeInterface
  #   interface_enabled = True
  #   port = /dev/ttyACM0
  #   frequency = 903625000
  #   bandwidth = 250000
  #   txpower = 22
  #   spreadingfactor = 7
  #   codingrate = 5
  #   # id_callsign = MYCALL
  #   # id_interval = 600
  #   # airtime_limit_long = 100
  #   # airtime_limit_short = 100


  # ===========================================================================
  # SERIAL INTERFACE - Raw serial / point-to-point link
  # ===========================================================================
  # Direct serial connection to another RNS node or serial device.
  # Useful for dedicated wired links or serial-based radio modems.

  # [[Serial Link]]
  #   type = SerialInterface
  #   enabled = yes
  #   port = /dev/ttyUSB0
  #   speed = 115200
  #   databits = 8
  #   parity = none
  #   stopbits = 1


  # ===========================================================================
  # KISS INTERFACE - Packet radio TNC
  # ===========================================================================
  # Standard KISS interface for packet radio modems (TNC) over
  # USB, serial, or TCP. Use with soundmodems and similar.

  # [[Packet Radio TNC]]
  #   type = KISSInterface
  #   enabled = yes
  #   port = /dev/ttyUSB1
  #   speed = 9600
  #   # kiss_framing = True
  #   # flow_control = False


  # ===========================================================================
  # UDP INTERFACE - Broadcast / multicast over IP
  # ===========================================================================
  # Broadcast RNS traffic over local IP networks via UDP.
  # Useful for quick LAN connectivity without AutoInterface.

  # [[UDP Broadcast]]
  #   type = UDPInterface
  #   enabled = yes
  #   listen_ip = 0.0.0.0
  #   listen_port = 4966
  #   forward_ip = 255.255.255.255
  #   forward_port = 4966


  # ===========================================================================
  # I2P INTERFACE - Anonymous overlay network
  # ===========================================================================
  # Routes RNS over I2P for privacy and censorship resistance.
  # Useful when you don't have a public IP or need anonymity.
  # Requires a running I2P router.

  # [[I2P]]
  #   type = I2PInterface
  #   enabled = yes
  #   peers = <destination1>.b32.i2p, <destination2>.b32.i2p
