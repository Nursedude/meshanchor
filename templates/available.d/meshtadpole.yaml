# MeshTadpole Configuration Template
# CH341 USB-to-SPI Low-Power LoRa Radio for Meshtastic
# MtnMesh Device (designed by wehooper4 and vid7)
#
# Hardware: SX1262 (E22-900M22S) via CH341 USB-SPI bridge
# Frequency: 915MHz ISM band (850-930 MHz)
# Power Output: +22dBm (160mW)
# Interface: USB-C
# Features: LNA for enhanced RX, smaller form factor than MeshToad
#
# Lower power consumption - suitable for standard USB ports

Lora:
  # === CH341 USB-to-SPI Configuration ===
  # Module type (required for SX1262)
  Module: sx1262

  # SPI device - use CH341 USB-SPI bridge
  spidev: ch341

  # CH341 GPIO mapping (fixed by hardware)
  CS: 0        # CH341 GPIO 0
  IRQ: 6       # CH341 GPIO 6 (DIO1)
  Reset: 2     # CH341 GPIO 2
  Busy: 4      # CH341 GPIO 4

  # === Radio Options ===
  # Use DIO2 as RF switch control (required for SX1262)
  DIO2_AS_RF_SWITCH: true

  # Enable DIO3 TCXO voltage control
  DIO3_TCXO_VOLTAGE: true

  # === Radio Parameters ===
  # MeshTadpole is a low-power device - good for portable/battery use

  # Transmit Power in dBm (max 22 for MeshTadpole)
  # TXpower: 22

  # Bandwidth in kHz (125, 250, 500)
  # Bandwidth: 250

  # Spreading Factor (7-12)
  # SpreadFactor: 11

  # Coding Rate (5-8 for 4/5 to 4/8)
  # CodingRate: 8

  # Hop Limit (0-7)
  # HopLimit: 3

  # Channel Slot (0-104 for US region)
  # ChannelNum: 20

Webserver:
  # Port 9443 is meshtasticd's web UI (browser config)
  # Port 4403 is the TCP API (CLI, Python SDK, MeshForge gateway)
  Port: 9443

# === MtnMesh Recommended Settings ===
# MediumFast preset (MtnMesh community standard):
#   Bandwidth: 250, SpreadFactor: 10, CodingRate: 8
#   Good balance of range and speed for community mesh
#
# For MtnMesh compatibility, see: https://mtnme.sh/mediumfast/

# === Use Cases ===
# MeshTadpole is ideal for:
#   - Battery-powered portable nodes
#   - USB-powered desktop nodes
#   - Lower-profile installations
#   - Testing and development
#
# For high-power applications, consider MeshToad (1W)

# === Troubleshooting ===
# If device not detected:
#   1. Check lsusb for CH341 (vendor 1a86:7523)
#   2. Ensure CH341 driver is loaded: modprobe ch341
#   3. Check dmesg for USB errors
#   4. Try different USB port/cable
