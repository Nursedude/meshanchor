# MeshToad Configuration Template
# CH341 USB-to-SPI 1W LoRa Radio for Meshtastic
# MtnMesh Device: https://mtnme.sh/devices/MeshToad/
#
# Hardware: SX1262 (E22-900M30S) via CH341 USB-SPI bridge
# Frequency: 915MHz ISM band (902-928 MHz) - US Region
# Power Output: +30dBm (1W)
# Interface: USB-C
# Features: LNA for enhanced RX, onboard EEPROM (auto-config 2.6.5+)
#
# IMPORTANT: Draws up to 900mA peak during TX
# May need supplemental power or reduced TX power on USB 2.0 ports

Lora:
  # === CH341 USB-to-SPI Configuration ===
  # Module type (required for SX1262)
  Module: sx1262

  # SPI device - use CH341 USB-SPI bridge
  spidev: ch341

  # CH341 GPIO mapping (fixed by hardware)
  CS: 0        # CH341 GPIO 0
  IRQ: 6       # CH341 GPIO 6 (DIO1)
  Reset: 2     # CH341 GPIO 2
  Busy: 4      # CH341 GPIO 4

  # === Radio Options ===
  # Use DIO2 as RF switch control (required for SX1262)
  DIO2_AS_RF_SWITCH: true

  # Enable DIO3 TCXO voltage control (required for temperature stability)
  DIO3_TCXO_VOLTAGE: true

  # === Radio Parameters ===
  # MeshToad is a 1W device - use responsibly!

  # Transmit Power in dBm (max 30 for MeshToad)
  # Start with 27 dBm to avoid power supply issues
  # TXpower: 27

  # Bandwidth in kHz (125, 250, 500)
  # Bandwidth: 250

  # Spreading Factor (7-12)
  # SpreadFactor: 11

  # Coding Rate (5-8 for 4/5 to 4/8)
  # CodingRate: 8

  # Hop Limit (0-7) - consider lower values for high-power nodes
  # HopLimit: 3

  # Channel Slot (0-104 for US region)
  # ChannelNum: 20

Webserver:
  # Port 9443 is meshtasticd's web UI (browser config)
  # Port 4403 is the TCP API (CLI, Python SDK, MeshForge gateway)
  Port: 9443

# === MtnMesh Recommended Settings ===
# MediumFast preset (MtnMesh community standard):
#   Bandwidth: 250, SpreadFactor: 10, CodingRate: 8
#   Good balance of range and speed for community mesh
#
# For MtnMesh compatibility, see: https://mtnme.sh/mediumfast/

# === USB Power Notes ===
# MeshToad at full 1W TX can draw 900mA, exceeding USB 2.0 spec (500mA)
# Options:
#   1. Use powered USB hub
#   2. Use USB 3.0 port (900mA limit)
#   3. Reduce TXpower to 20-25 dBm for USB 2.0 compatibility
#   4. Use supplemental power if available

# === Troubleshooting ===
# If device not detected:
#   1. Check lsusb for CH341 (vendor 1a86:7523 or 1a86:55d4)
#   2. Ensure CH341 driver is loaded: modprobe ch341
#   3. Check dmesg for USB errors
#   4. Try different USB port/cable
