# Volcano AI — Reticulum Network Stack Configuration
# ===================================================
# RNS gateway node with USB meshtoad (serial, no TCP contention)
#
# Install:
#   1. pip3 install rns nomadnet
#   2. Copy this file to /etc/reticulum/config
#   3. Copy Meshtastic_Interface.py to /etc/reticulum/interfaces/
#   4. Verify serial device: ls /dev/ttyUSB* /dev/ttyACM*
#   5. sudo systemctl restart rnsd
#
# After editing, restart rnsd: sudo systemctl restart rnsd


[reticulum]

  enable_transport = False
  share_instance = Yes
  shared_instance_port = 37428
  instance_control_port = 37429


[logging]
  loglevel = 4


[interfaces]

  # ===========================================================================
  # AUTO INTERFACE - Local Network Discovery (zero-config)
  # ===========================================================================

  [[Default Interface]]
    type = AutoInterface
    enabled = Yes


  # ===========================================================================
  # MESHTASTIC GATEWAY - RNS over Meshtastic LoRa (USB serial)
  # ===========================================================================
  # Uses serial connection to meshtoad — does NOT conflict with meshtasticd
  # TCP API, so the web UI on :9443 stays fully functional.
  #
  # Verify your serial device path:
  #   ls /dev/ttyUSB* /dev/ttyACM*
  #
  # data_speed must match the Meshtastic modem preset on ALL nodes:
  #   8 = SHORT_TURBO  |  6 = SHORT_FAST  |  0 = LONG_FAST

  [[Meshtastic Gateway]]
    type = Meshtastic_Interface
    enabled = yes
    port = /dev/ttyACM0
    data_speed = 8
    hop_limit = 3


  # ===========================================================================
  # MOC LINK - TCP client to MeshForge MOC Regional
  # ===========================================================================
  # Connects to the MOC Pi's RNS TCP server for cross-node RNS routing.
  # All RNS traffic (LXMF, announces, paths) flows over this IP link.

  [[MOC Regional]]
    type = TCPClientInterface
    enabled = yes
    target_host = 192.168.86.38
    target_port = 4242


  # ===========================================================================
  # TCP SERVER - Accept inbound RNS connections
  # ===========================================================================
  # Optional: let other RNS nodes connect to Volcano AI directly.

  # [[Volcano RNS Server]]
  #   type = TCPServerInterface
  #   enabled = yes
  #   listen_ip = 0.0.0.0
  #   listen_port = 4242


  # ===========================================================================
  # PUBLIC RNS NODE - BetweenTheBorders (USA)
  # ===========================================================================

  [[RNS BetweenTheBorders]]
    type = TCPClientInterface
    enabled = yes
    target_host = reticulum.betweentheborders.com
    target_port = 4242
