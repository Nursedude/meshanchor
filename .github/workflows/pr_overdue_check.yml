name: PR Overdue Check

# Mirror of MeshForge's Insight 2 (2026-05-03 diagnostic-insights plan).
# Born from PR #1153 in the MeshForge repo: web-Claude opened a 2-line
# CI fix that was 54 commits behind main and would have reverted ~10,875
# lines if merged. Title looked legit; only diff stat + behind-count
# exposed it. Same risk applies here — MeshAnchor takes web-Claude PRs
# too.
#
# Posts a comment with diff stat + behind-count whenever a PR is opened
# OR has new commits (synchronize) AND is more than 20 commits behind
# its base. Single rolling comment per PR via marker.
#
# Labels the PR `overdue` so it shows up in repo filters; removes the
# label once the PR rebases below threshold.

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.fork == false || github.event.pull_request.author_association == 'COLLABORATOR'
    steps:
      - name: Checkout PR with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Compute behind / ahead / diff stat
        id: stats
        run: |
          set -u
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          # Fetch base branch tip and use FETCH_HEAD. The previous form
          # used `--prune` with an explicit refspec; on actions/checkout's
          # narrow `remote.origin.fetch` config that combination DELETED
          # `origin/main` instead of updating it, breaking `git rev-parse
          # origin/$BASE_REF` (see PR #13 CI run 25297110388).
          git fetch --no-tags origin "$BASE_REF"
          BASE_TIP="$(git rev-parse FETCH_HEAD)"

          BEHIND=$(git rev-list --count "$HEAD_SHA..$BASE_TIP")
          AHEAD=$(git rev-list --count "$BASE_TIP..$HEAD_SHA" || echo "?")

          STAT_FILE=$(mktemp)
          git diff "$BASE_TIP..$HEAD_SHA" --stat | tail -25 > "$STAT_FILE"
          STAT_BLOCK=$(cat "$STAT_FILE")
          SHORTSTAT=$(git diff "$BASE_TIP..$HEAD_SHA" --shortstat 2>/dev/null || true)
          TOTAL_LINES=$(echo "$SHORTSTAT" \
              | grep -oE '[0-9]+ insertions|[0-9]+ deletions' \
              | grep -oE '^[0-9]+' \
              | paste -sd+ \
              | bc 2>/dev/null || echo 0)

          {
              echo "behind=$BEHIND"
              echo "ahead=$AHEAD"
              echo "total_lines=${TOTAL_LINES:-0}"
              echo "base_ref=$BASE_REF"
              echo "stat_block<<EOF_STAT"
              echo "$STAT_BLOCK"
              echo "EOF_STAT"
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR (or update existing)
        if: steps.stats.outputs.behind != '0'
        uses: actions/github-script@v7
        env:
          BEHIND: ${{ steps.stats.outputs.behind }}
          AHEAD: ${{ steps.stats.outputs.ahead }}
          TOTAL_LINES: ${{ steps.stats.outputs.total_lines }}
          BASE_REF: ${{ steps.stats.outputs.base_ref }}
          STAT_BLOCK: ${{ steps.stats.outputs.stat_block }}
        with:
          script: |
            const MARKER = '<!-- meshanchor-pr-overdue-check -->';
            const THRESHOLD = 20;
            const behind = parseInt(process.env.BEHIND || '0', 10);
            const ahead = process.env.AHEAD;
            const totalLines = process.env.TOTAL_LINES || '?';
            const baseRef = process.env.BASE_REF;
            const statBlock = process.env.STAT_BLOCK || '(no diff stat available)';

            const overdue = behind > THRESHOLD;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
                owner, repo, issue_number, per_page: 100
            });
            const existing = comments.find(c => c.body && c.body.includes(MARKER));

            try {
                if (overdue) {
                    await github.rest.issues.addLabels({
                        owner, repo, issue_number, labels: ['overdue']
                    });
                } else {
                    await github.rest.issues.removeLabel({
                        owner, repo, issue_number, name: 'overdue'
                    }).catch(() => {});
                }
            } catch (e) {
                core.warning(`Label management failed: ${e.message}`);
            }

            if (!overdue) {
                if (existing) {
                    await github.rest.issues.deleteComment({
                        owner, repo, comment_id: existing.id
                    }).catch(() => {});
                }
                return;
            }

            const body = [
                MARKER,
                `### ⚠ PR is **${behind} commits behind \`${baseRef}\`**`,
                '',
                `(${ahead} ahead, ${totalLines} total lines changed)`,
                '',
                'A PR this far behind base risks reverting downstream changes when',
                'merged. Compare the diff scope below against the PR title — if the',
                'diff dwarfs the apparent scope, rebase before merging.',
                '',
                '```',
                statBlock,
                '```',
                '',
                '_Sibling of MeshForge\'s pr_overdue_check workflow. Born from a_',
                '_2-line CI fix PR that was 54 commits behind main and would have_',
                '_reverted ~10,875 lines._',
            ].join('\n');

            if (existing) {
                await github.rest.issues.updateComment({
                    owner, repo, comment_id: existing.id, body
                });
            } else {
                await github.rest.issues.createComment({
                    owner, repo, issue_number, body
                });
            }
