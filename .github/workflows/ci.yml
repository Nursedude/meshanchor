name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run MeshForge linter
        run: |
          python3 scripts/lint.py --all
        continue-on-error: false

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov rich textual flask pyyaml requests psutil
          pip install meshtastic || echo "meshtastic optional"

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short
        continue-on-error: false

      - name: Run tests with coverage
        if: matrix.python-version == '3.11'
        run: |
          python -m pytest tests/ --cov=src --cov-report=xml --cov-report=term-missing

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python syntax
        run: |
          python -m py_compile src/**/*.py || find src -name "*.py" -exec python -m py_compile {} \;

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Path.home() violations (MF001)
        run: |
          # Check for bare Path.home() without SUDO_USER handling
          if grep -rn "Path\.home()" src/ --include="*.py" | grep -v "get_real_user_home" | grep -v "SUDO_USER" | grep -v "fallback"; then
            echo "Warning: Found potential Path.home() violations"
          fi

      - name: Check for shell=True violations (MF002)
        run: |
          # Only match actual shell=True usage, not comments or strings
          if grep -rn "subprocess.*shell=True" src/ --include="*.py" | grep -v "^[^:]*:[^:]*:#"; then
            echo "ERROR: Found shell=True in subprocess call - security violation MF002"
            exit 1
          fi
          echo "No shell=True violations found"

      - name: Check for bare except violations (MF003)
        run: |
          if grep -rn "except:" src/ --include="*.py" | grep -v "except Exception"; then
            echo "Warning: Found bare except clauses"
          fi
