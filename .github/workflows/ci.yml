name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run MeshAnchor linter
        run: python3 scripts/lint.py --all

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Kill job if tests hang
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-timeout rich textual flask pyyaml requests psutil distro
          pip install meshcore || echo "meshcore optional - continuing"
          pip install meshtastic || echo "meshtastic optional gateway - continuing"
          pip install folium || echo "folium optional - continuing"

      - name: Run tests
        id: pytest
        run: |
          set -o pipefail
          python -m pytest tests/ -v --tb=short --timeout=30 --timeout-method=thread -x --ignore=tests/test_bridge_integration.py 2>&1 | tee /tmp/pytest.log | head -500
        env:
          CI: true
          MESHANCHOR_CI: true

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-py${{ matrix.python-version }}
          path: /tmp/pytest.log
          if-no-files-found: ignore

      - name: Post failure summary to PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = '';
            try {
              log = fs.readFileSync('/tmp/pytest.log', 'utf8');
            } catch (e) {
              core.warning(`Could not read /tmp/pytest.log: ${e.message}`);
              return;
            }

            const lines = log.split('\n');
            const failedLines = lines.filter(l => /^FAILED |^ERROR |^E {3}/.test(l)).slice(0, 30);
            const shortSummary = lines.slice(-60).join('\n');
            const pyVersion = '${{ matrix.python-version }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              `## Pytest failure (Python ${pyVersion})`,
              ``,
              `Job failed on \`${context.sha.substring(0, 7)}\`. [View full run](${runUrl}).`,
              ``,
              failedLines.length ? `### Failures/Errors\n\n\`\`\`\n${failedLines.join('\n')}\n\`\`\`` : '',
              `### Tail of pytest output`,
              ``,
              '```',
              shortSummary,
              '```',
              ``,
              `_Full log available as artifact \`pytest-log-py${pyVersion}\`._`,
            ].filter(Boolean).join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python syntax
        run: |
          find src -name "*.py" -type f -exec python -m py_compile {} \;
          echo "Syntax check passed"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for shell=True violations (MF002)
        run: |
          # Only fail on actual shell=True in subprocess calls, not comments
          VIOLATIONS=$(grep -rn "subprocess\.\(run\|Popen\|call\).*shell\s*=\s*True" src/ --include="*.py" 2>/dev/null || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "ERROR: Found shell=True in subprocess calls:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "No shell=True violations found"

      - name: Check for hardcoded secrets
        run: |
          # Basic check for potential secrets
          if grep -rn "password\s*=\s*['\"][^'\"]\+" src/ --include="*.py" | grep -v "password\s*=\s*['\"]['\"]" | grep -v "#" | head -5; then
            echo "Warning: Potential hardcoded passwords found"
          fi
          echo "Security scan complete"
