name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run MeshAnchor linter
        run: python3 scripts/lint.py --all

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Kill job if tests hang
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-timeout rich textual flask pyyaml requests psutil distro
          pip install meshcore || echo "meshcore optional - continuing"
          pip install meshtastic || echo "meshtastic optional gateway - continuing"
          pip install folium || echo "folium optional - continuing"

      - name: Run tests
        id: pytest
        run: |
          set -o pipefail
          python -m pytest tests/ -v --tb=short --timeout=30 --timeout-method=thread -x --ignore=tests/test_bridge_integration.py 2>&1 | tee /tmp/pytest.log | head -500
        env:
          CI: true
          MESHANCHOR_CI: true

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-py${{ matrix.python-version }}
          path: /tmp/pytest.log
          if-no-files-found: ignore

  pr-comment:
    name: PR Failure Comment
    runs-on: ubuntu-latest
    # Scoped write permission lives ONLY on this job — it never runs user code
    # from the PR branch, so GITHUB_TOKEN cannot be exfiltrated by test code.
    permissions:
      pull-requests: write
    needs: test
    if: always() && needs.test.result == 'failure' && github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11']
    steps:
      - name: Download pytest log
        id: download
        uses: actions/download-artifact@v4
        with:
          name: pytest-log-py${{ matrix.python-version }}
          path: /tmp/pytest-artifact
        continue-on-error: true

      - name: Build sanitized comment body
        id: build
        if: steps.download.outcome == 'success'
        env:
          PY_VERSION: ${{ matrix.python-version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          set -o pipefail
          python3 - <<'PY'
          import os, re, sys
          from pathlib import Path

          log_path = Path('/tmp/pytest-artifact/pytest.log')
          if not log_path.exists():
              print('No pytest log artifact; skipping comment', file=sys.stderr)
              sys.exit(0)

          raw = log_path.read_text(encoding='utf-8', errors='replace')
          # Replace triple-backtick runs so pytest output cannot break out of the
          # markdown code fence. U+200B (zero-width space) keeps the glyphs visible.
          ZWSP = '\u200b'
          sanitized = raw.replace('```', f'`{ZWSP}`{ZWSP}`')

          lines = sanitized.splitlines()
          failed = [l for l in lines if re.match(r'^(FAILED |ERROR |E {3})', l)][:30]
          tail = '\n'.join(lines[-60:])

          py = os.environ['PY_VERSION']
          run_url = os.environ['RUN_URL']
          sha = os.environ['SHA'][:7]

          parts = [
              f'## Pytest failure (Python {py})',
              '',
              f'Job failed on `{sha}`. [View full run]({run_url}).',
              '',
          ]
          if failed:
              parts.extend([
                  '### Failures/Errors',
                  '',
                  '```',
                  '\n'.join(failed),
                  '```',
                  '',
              ])
          parts.extend([
              '### Tail of pytest output',
              '',
              '```',
              tail,
              '```',
              '',
              f'_Full log available as artifact `pytest-log-py{py}`._',
          ])

          Path('/tmp/pr-comment.md').write_text('\n'.join(parts), encoding='utf-8')
          print(f'Wrote /tmp/pr-comment.md ({len(failed)} failure lines, {len(lines)} total lines)')
          PY

      - name: Post sticky comment
        if: steps.download.outcome == 'success'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pytest-py${{ matrix.python-version }}
          path: /tmp/pr-comment.md

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python syntax
        run: |
          set -o pipefail
          find src -name "*.py" -type f -exec python -m py_compile {} \;
          echo "Syntax check passed"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for shell=True violations (MF002)
        run: |
          set -o pipefail
          # Only fail on actual shell=True in subprocess calls, not comments
          VIOLATIONS=$(grep -rn "subprocess\.\(run\|Popen\|call\).*shell\s*=\s*True" src/ --include="*.py" 2>/dev/null || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "ERROR: Found shell=True in subprocess calls:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "No shell=True violations found"

      - name: Check for hardcoded secrets
        run: |
          set -o pipefail
          # Basic check for potential secrets
          if grep -rn "password\s*=\s*['\"][^'\"]\+" src/ --include="*.py" | grep -v "password\s*=\s*['\"]['\"]" | grep -v "#" | head -5; then
            echo "Warning: Potential hardcoded passwords found"
          fi
          echo "Security scan complete"
