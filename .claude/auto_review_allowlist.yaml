# MeshForge Auto-Review Allowlist
# ================================
# Documents known false positives in the auto-review system.
# Each entry explains WHY the pattern is safe, preventing fix-break cycles.
#
# Format:
#   - file: relative path from src/
#     line: approximate line number (may drift with edits)
#     pattern: the auto-review pattern that matched
#     reason: clear explanation of why this is safe
#     guard: the actual guard that protects this code
#     reviewed: date of last review
#
# Patterns:
#   - index_no_check: Index access without apparent bounds check
#   - exception_pass: Exception caught with pass/no logging
#
# Maintainer: Review this file when auto-review issues change significantly
# Last updated: 2026-01-17

