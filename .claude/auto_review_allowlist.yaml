# ===========================================================================
# GUIDANCE FOR REVIEWERS
# ===========================================================================
#
# When adding new entries:
# 1. Verify the guard actually exists at the specified location
# 2. Explain WHY the pattern is safe, not just WHAT the guard is
# 3. Update the 'reviewed' date
# 4. Consider if the code could be refactored to avoid the pattern entirely
#
# When auto-review flags new issues:
# 1. First check if it's a real issue that needs fixing
# 2. If it's a false positive, add it here with full documentation
# 3. Consider improving the auto-review patterns to detect the guard
#
# Periodic review:
# - Review this file quarterly to ensure entries are still valid
# - Remove entries for code that has been refactored
# - Update line numbers if they've drifted significantly
